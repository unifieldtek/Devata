<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vedic Devata Display - Select Version</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            line-height: 1.6;
            max-width: 600px;
            margin: 40px auto;
            padding: 0 20px;
            color: #333;
            text-align: center;
        }
        h1 {
            color: #111;
            margin-bottom: 10px;
        }
        p {
            color: #666;
            margin-bottom: 30px;
        }
        .version-list {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        .version-btn {
            display: block;
            padding: 15px 20px;
            background-color: #f6f8fa;
            border: 1px solid #d0d7de;
            border-radius: 6px;
            text-decoration: none;
            color: #0969da;
            font-weight: 600;
            transition: all 0.2s ease;
        }
        .version-btn:hover {
            background-color: #0969da;
            color: #ffffff;
            border-color: #0969da;
        }
        .description {
            font-size: 0.85em;
            color: #57606a;
            font-weight: normal;
            display: block;
            margin-top: 5px;
        }
    </style>
</head>
<body>

    <h1>Vedic Devata Interactive Display</h1>
    <p>Please select a version to view the display and hear the recitations:</p>

    <div class="version-list">
        <a href="Version_1.html" class="version-btn">
            Version 1
            <span class="description">Standard hotspot selection styling</span>
        </a>
        <a href="Version_2.html" class="version-btn">
            Version 2
            <span class="description">Alternate hotspot highlighting method</span>
        </a>
        <a href="Version_3.html" class="version-btn">
            Version 3
            <span class="description">Enhanced visual hotspot highlighting</span>
        </a>
    </div>

</body>
</html>
