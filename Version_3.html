<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Devata Recitations</title>
  <style>
    body { font-family: Arial, sans-serif; background: #111; color: #0f0; text-align: center; margin: 0; padding: 10px; }
    h1 { color: #0f0; margin: 20px 0; }
    .container { position: relative; max-width: 1000px; margin: 0 auto; display: inline-block; }
    #main-image { width: 100%; max-width: 1795px; height: auto; border: 3px solid #444; border-radius: 12px; display: block; }
    
    /* NEW & IMPROVED RAINBOW HIGHLIGHT */
    .highlight {
      position: absolute;
      pointer-events: none;
      transition: all 0.4s;
      border-radius: 8px;
      display: none;
      z-index: 10;
      box-sizing: border-box;

       Creating the smooth border using a rainbow gradient
      border: 5px solid transparent;
      border-image: linear-gradient(45deg, #ff0000, #ff7300, #fffb00, #48ff00, #00ffd5, #002bff, #7a00ff, #ff00c8, #ff0000) 1;
      
      /* A soft, transparent rainbow background inside the box so it doesn't obscure the art */
      background: linear-gradient(45deg, rgba(255,0,0,0.30), rgba(0,255,0,0.30), rgba(0,0,255,0.30));
      
      /* Glowing drop shadow */
      box-shadow: 0 0 25px rgba(255, 255, 255, 0.2), inset 0 0 15px rgba(255, 255, 255, 0.1);
      
      /* This runs a continuous 6-second cycle shifting the rainbow hue smoothly */
      animation: rainbowCycle 6s linear infinite;
    }

    /* Animation that smoothly cycles through the color wheel */
    @keyframes rainbowCycle {
      0% { filter: hue-rotate(0deg); }
      100% { filter: hue-rotate(360deg); }
    }

    /* TROUBLESHOOTING HOTSPOTS: Currently set to semi-transparent green */
    /* For final production, change background to: rgba(255,255,255,0) and remove the border! */
    .hotspot { 
      position: absolute; 
      cursor: pointer; 
      background: rgba(255, 255, 255, 0); 
      /*border: 2px dashed #0f0;*/
      box-sizing: border-box;
      z-index: 5;
    }

    .now-playing {
      margin: 20px auto;
      padding: 15px;
      background: #222;
      border-radius: 10px;
      max-width: 800px;
      min-height: 50px;
    }
    .demo-btn {
      margin: 25px auto;      
      padding: 15px 40px;      
      font-size: 1.4em;      
      background: #330;
      color: #ff0;
      border: 3px solid #f80;
      border-radius: 12px;
      cursor: pointer;
    }
  </style>
</head>
<body>

  <h1>Devata Recitations</h1>
  <div class="now-playing" id="status">Ready - Tap a section</div>

  <div class="container">
    <img id="main-image" src="statue_map.jpg" alt="Statue Map">
    <div class="highlight" id="highlight"></div>

    <div class="hotspot" style="left:5%; top:77%; width:26%; height:18%;" onclick="playFull(0)" title="Hanuman"></div>
    <div class="hotspot" style="left:34%; top:77%; width:26%; height:18%;" onclick="playFull(1)" title="Ganesh"></div>
    <div class="hotspot" style="left:66%; top:77%; width:26%; height:18%;" onclick="playFull(2)" title="Shiva"></div>
    <div class="hotspot" style="left:69%; top:52%; width:24%; height:19%;" onclick="playFull(3)" title="Saraswati"></div>
    <div class="hotspot" style="left:37%; top:52%; width:29%; height:19%;" onclick="playFull(4)" title="Durga"></div>
    <div class="hotspot" style="left:5%; top:52%; width:29%; height:19%;" onclick="playFull(5)" title="Narayana"></div>
    <div class="hotspot" style="left:4%; top:29%; width:48%; height:18%;" onclick="playFull(6)" title="Vishnu"></div>
    <div class="hotspot" style="left:55%; top:29%; width:40%; height:18%;" onclick="playFull(7)" title="Surya"></div>
    <div class="hotspot" style="left:5%; top:4.2%; width:89%; height:18.5%;" onclick="playFull(8)" title="Mahalakshmi"></div>
  </div>

  <br>
  <button class="demo-btn" onclick="handleDemoClick()">▶ DEMO MODE (60s random clips)</button>
  <br>

  <audio id="player" controls style="margin-top:20px; width:90%; max-width:800px;"></audio>

  <script>
    const player = document.getElementById('player');
    const status = document.getElementById('status');
    const highlight = document.getElementById('highlight');
    let demoInterval = null;
    let lastDemoClickTime = 0; 

    const statueNames = [
      "Hanuman", "Ganesh", "Shiva", "Saraswati", "Durga", "Narayana", "Vishnu", "Surya", "Mahalakshmi"
    ];

    const boxes = [
      {left:"5%", top:"77%", width:"26%", height:"18%"},    
      {left:"34%", top:"77%", width:"26%", height:"18%"},   
      {left:"66%", top:"77%", width:"26%", height:"18%"},   
      {left:"69%", top:"52%", width:"24%", height:"19%"},   
      {left:"37%", top:"52%", width:"29%", height:"19%"},   
      {left:"5%", top:"52%", width:"29%", height:"19%"},    
      {left:"4%", top:"29%", width:"48%", height:"18%"},    
      {left:"55%", top:"29%", width:"40%", height:"18%"},   
      {left:"5%", top:"4.2%", width:"89%", height:"18.5%"}  
    ];

    function highlightStatue(index) {
      if (index >= 0 && index < boxes.length) {
        const b = boxes[index];
        highlight.style.left = b.left;
        highlight.style.top = b.top;
        highlight.style.width = b.width;
        highlight.style.height = b.height;
        highlight.style.display = 'block';
      }
    }

    function clearHighlight() {
      highlight.style.display = 'none';
    }

    function playFull(index) {
      clearDemo();
      const file = `audio/full/${String(index + 1).padStart(4, '0')}.mp3`;
      
      player.src = file;
      player.play().catch(err => console.log("Playback error:", err));
      status.textContent = `Playing full version - ${statueNames[index]}`;
      highlightStatue(index);
    }

    function playRandomClip(index) {
      const maxClips = [6, 11, 21, 40, 40, 7, 35, 5, 31];
      const maxClip = maxClips[index] || 5;
      const clip = Math.floor(Math.random() * maxClip) + 1;
      
      const folder = String(index + 1).padStart(2, '0');
      const file = `audio/${folder}/${String(clip).padStart(3, '0')}.mp3`;
      
      player.src = file;
      player.play().catch(err => console.log("Playback error:", err));
      status.textContent = `Demo - ${statueNames[index]} (clip ${clip})`;
      highlightStatue(index);
    }

    function handleDemoClick() {
      const currentTime = new Date().getTime();
      const timeDifference = currentTime - lastDemoClickTime;

      if (demoInterval && timeDifference < 2000) {
        stopEverything();
        status.textContent = "Demo Stopped - Returned to Wait State";
      } else {
        startDemo();
      }
      
      lastDemoClickTime = currentTime;
    }

    function startDemo() {
      clearDemo();
      status.textContent = "Demo Mode Initializing...";
      
      let current = 0; 
      function next() {
        playRandomClip(current);
        current = (current + 1) % 9; 
      }
      next();
      demoInterval = setInterval(next, 60000); 
    }

    function clearDemo() {
      if (demoInterval) clearInterval(demoInterval);
      demoInterval = null;
      clearHighlight();
    }

    function stopEverything() {
      clearDemo();
      player.pause();
      player.src = ""; 
    }
  </script>
</body>
</html>
